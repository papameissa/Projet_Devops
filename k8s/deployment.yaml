apiVersion: apps/v1
kind: Deployment
metadata:
  name: task-app
  namespace: application
  labels:
    app: task-app
spec:
  replicas: 2
  selector:
    matchLabels:
      app: task-app
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: task-app
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        fsGroup: 1000
      initContainers:
        - name: wait-for-postgres
          image: postgres:16-alpine
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
          env:
            # Sans -U explicite, pg_isready tente de résoudre l'utilisateur OS
            # courant (UID 1000, imposé par le securityContext du pod) via
            # getpwuid() — mais l'image postgres:16-alpine ne connaît que
            # l'utilisateur "postgres" (UID 999) dans /etc/passwd. Résultat :
            # "no attempt" (échec silencieux avant même la tentative de
            # connexion TCP), alors qu'un simple "nc" fonctionne très bien.
            - name: POSTGRES_USER
              valueFrom:
                secretKeyRef:
                  name: task-secrets
                  key: POSTGRES_USER
          command:
            - sh
            - -c
            - |
              until pg_isready -h task-db -p 5432 -U "$POSTGRES_USER"; do
                echo "En attente de PostgreSQL (task-db)...";
                sleep 3;
              done
              echo "PostgreSQL prêt, démarrage de task-app.";
      containers:
        - name: task-app
          image: REMPLACER_PAR_TON_ECR_URI:latest
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
          ports:
            - containerPort: 5000
          envFrom:
            - configMapRef:
                name: task-config
            - secretRef:
                name: task-secrets
          readinessProbe:
            httpGet:
              path: /ready
              port: 5000
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 5000
            initialDelaySeconds: 20
            periodSeconds: 20
          resources:
            requests:
              cpu: "50m"
              memory: "96Mi"
            limits:
              cpu: "250m"
              memory: "200Mi"
