apiVersion: v1
kind: Service
metadata:
  name: task-service
  namespace: application
spec:
  # ClusterIP : ce Service n'est plus exposé directement sur Internet.
  # C'est désormais la ressource Ingress (k8s/ingress.yaml), pilotée par
  # l'AWS Load Balancer Controller, qui provisionne l'ALB public et route
  # le trafic vers ce Service en interne.
  type: ClusterIP
  selector:
    app: task-app
  ports:
    - name: http
      protocol: TCP
      port: 80
      targetPort: 5000
