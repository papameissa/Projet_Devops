apiVersion: v1
kind: Service
metadata:
  name: task-service
  namespace: application
  annotations:
    # "alb" n'est pas une valeur valide pour l'annotation d'un Service (elle ne
    # s'applique qu'aux ressources Ingress via l'AWS Load Balancer Controller).
    # Pour un Service type LoadBalancer natif AWS, la valeur correcte est "nlb".
    service.beta.kubernetes.io/aws-load-balancer-type: "nlb"
    service.beta.kubernetes.io/aws-load-balancer-scheme: "internet-facing"
spec:
  type: LoadBalancer
  selector:
    app: task-app
  ports:
    - name: http
      protocol: TCP
      port: 80
      targetPort: 5000
