[defaults]
# interpreter_python: auto-détection (portable entre Kali, GitHub-hosted
# runners, et toute autre machine) — un chemin en dur (ex. python3.13) casse
# dès que la version exacte diffère d'une machine à l'autre.
interpreter_python = auto_silent
host_key_checking = False
inventory = inventory/hosts.ini
result_format = yaml
# collections_path volontairement omis : on laisse Ansible utiliser son chemin
# par défaut (~/.ansible/collections), qui fonctionne aussi bien en local que
# sur les runners GitHub-hosted (le user n'y est jamais "papa").

[ssh_connection]
pipelining = True
