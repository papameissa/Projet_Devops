---
# ==============================================================================
# 01_vpc.yml — Créer le VPC AWS complet pour EKS
# Pas de NAT Gateway (économie ~32$/mois) : 2 subnets publics uniquement,
# suffisant pour un projet de mémoire avec quota vCPU limité.
# Toutes les variables viennent de group_vars/all.yml (source unique).
# ==============================================================================
- name: Créer le VPC AWS complet pour EKS
  hosts: local
  gather_facts: false
  vars_files:
    - ../group_vars/all.yml

  tasks:
    - name: Créer le VPC
      amazon.aws.ec2_vpc_net:
        name: devops-vpc
        cidr_block: "{{ vpc_cidr }}"
        region: "{{ aws_region }}"
        dns_support: true
        dns_hostnames: true
        tags:
          Name: devops-vpc
          "kubernetes.io/cluster/{{ eks_cluster_name }}": shared
        state: present
      register: vpc

    - name: Afficher l'ID du VPC
      debug:
        msg: "VPC créé avec l'ID : {{ vpc.vpc.id }}"

    - name: Créer l'Internet Gateway
      amazon.aws.ec2_vpc_igw:
        vpc_id: "{{ vpc.vpc.id }}"
        region: "{{ aws_region }}"
        tags:
          Name: devops-igw
        state: present
      register: igw

    - name: "Créer le subnet public 1 ({{ az1 }})"
      amazon.aws.ec2_vpc_subnet:
        vpc_id: "{{ vpc.vpc.id }}"
        cidr: "{{ public_subnet1_cidr }}"
        az: "{{ az1 }}"
        region: "{{ aws_region }}"
        map_public: true
        tags:
          Name: devops-public-subnet-1
          "kubernetes.io/cluster/{{ eks_cluster_name }}": shared
          "kubernetes.io/role/elb": "1"
        state: present
      register: public_subnet1

    - name: "Créer le subnet public 2 ({{ az2 }})"
      amazon.aws.ec2_vpc_subnet:
        vpc_id: "{{ vpc.vpc.id }}"
        cidr: "{{ public_subnet2_cidr }}"
        az: "{{ az2 }}"
        region: "{{ aws_region }}"
        map_public: true
        tags:
          Name: devops-public-subnet-2
          "kubernetes.io/cluster/{{ eks_cluster_name }}": shared
          "kubernetes.io/role/elb": "1"
        state: present
      register: public_subnet2

    - name: Créer la table de routage publique
      amazon.aws.ec2_vpc_route_table:
        vpc_id: "{{ vpc.vpc.id }}"
        region: "{{ aws_region }}"
        tags:
          Name: devops-public-rt
        subnets:
          - "{{ public_subnet1.subnet.id }}"
          - "{{ public_subnet2.subnet.id }}"
        routes:
          - dest: 0.0.0.0/0
            gateway_id: "{{ igw.gateway_id }}"
        state: present

    - name: Récapitulatif de l'infrastructure réseau créée
      debug:
        msg:
          - "VPC ID          : {{ vpc.vpc.id }}"
          - "IGW ID          : {{ igw.gateway_id }}"
          - "Subnet public 1 : {{ public_subnet1.subnet.id }} ({{ public_subnet1_cidr }}) — {{ az1 }}"
          - "Subnet public 2 : {{ public_subnet2.subnet.id }} ({{ public_subnet2_cidr }}) — {{ az2 }}"
