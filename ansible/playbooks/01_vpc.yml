---
# ==============================================================================
# 01_vpc.yml — Créer le VPC AWS complet pour EKS
# Pas de NAT Gateway (économie ~32$/mois) : 2 subnets publics uniquement,
# suffisant pour un projet de mémoire avec quota vCPU limité.
# Toutes les variables viennent de group_vars/all.yml (source unique).
# ==============================================================================
- name: Créer le VPC AWS complet pour EKS
  hosts: local
  gather_facts: false
  vars_files:
    - ../group_vars/all.yml

  tasks:
    # ---------- Fix bug Ansible : les clés de dict YAML ne sont PAS templées ----------
    # VÉCU sur ce projet, confirmé par test isolé : écrire
    #   tags:
    #     "kubernetes.io/cluster/{{ eks_cluster_name }}": shared
    # applique LITTÉRALEMENT la clé "kubernetes.io/cluster/{{ eks_cluster_name }}"
    # sur AWS (Ansible ne template que les VALEURS d'un dict YAML, jamais les
    # clés). Ce bug a cassé la découverte automatique des subnets par l'ALB
    # Controller pendant des heures, sur CHAQUE run de ce playbook depuis le
    # début du projet. Fix : construire le dict de tags comme une SEULE
    # expression Jinja (syntaxe Python), où la clé est alors une vraie
    # expression évaluée par le moteur Jinja, pas du YAML statique.
    - name: Précalculer la clé de tag cluster (utilisée dans un dict Jinja complet plus bas)
      ansible.builtin.set_fact:
        cluster_tag_key: "kubernetes.io/cluster/{{ eks_cluster_name }}"

    - name: Créer le VPC
      amazon.aws.ec2_vpc_net:
        name: devops-vpc
        cidr_block: "{{ vpc_cidr }}"
        region: "{{ aws_region }}"
        dns_support: true
        dns_hostnames: true
        tags: "{{ {'Name': 'devops-vpc', cluster_tag_key: 'shared'} }}"
        state: present
      register: vpc

    - name: Afficher l'ID du VPC
      debug:
        msg: "VPC créé avec l'ID : {{ vpc.vpc.id }}"

    - name: Créer l'Internet Gateway
      amazon.aws.ec2_vpc_igw:
        vpc_id: "{{ vpc.vpc.id }}"
        region: "{{ aws_region }}"
        tags:
          Name: devops-igw
        state: present
      register: igw

    - name: "Créer le subnet public 1 ({{ az1 }})"
      amazon.aws.ec2_vpc_subnet:
        vpc_id: "{{ vpc.vpc.id }}"
        cidr: "{{ public_subnet1_cidr }}"
        az: "{{ az1 }}"
        region: "{{ aws_region }}"
        map_public: true
        tags: "{{ {'Name': 'devops-public-subnet-1', cluster_tag_key: 'shared', 'kubernetes.io/role/elb': '1'} }}"
        state: present
      register: public_subnet1

    - name: "Créer le subnet public 2 ({{ az2 }})"
      amazon.aws.ec2_vpc_subnet:
        vpc_id: "{{ vpc.vpc.id }}"
        cidr: "{{ public_subnet2_cidr }}"
        az: "{{ az2 }}"
        region: "{{ aws_region }}"
        map_public: true
        tags: "{{ {'Name': 'devops-public-subnet-2', cluster_tag_key: 'shared', 'kubernetes.io/role/elb': '1'} }}"
        state: present
      register: public_subnet2

    # ---------- Garde-fou : détecter un tag cluster mal templaté ----------
    # VÉCU sur ce projet : les subnets se sont retrouvés tagués avec le texte
    # LITTÉRAL "kubernetes.io/cluster/{{ eks_cluster_name }}" (Jinja2 jamais
    # résolu, probablement un run très ancien avec une variable non définie
    # à l'époque). Résultat : l'ALB Controller ne reconnaît plus les subnets
    # pour AUCUN cluster ("2 are tagged for other clusters"), erreur détectée
    # seulement bien plus tard, à l'étape Ingress. On vérifie ici, tout de
    # suite après le tagging, que le tag réellement présent sur AWS est bon.
    - name: Vérifier que les tags de cluster sont correctement résolus sur AWS
      # Retries : cohérence éventuelle d'AWS — le tag vient d'être posé à
      # l'instant (create_subnet + create_tags), describe-subnets peut mettre
      # quelques secondes à le refléter systématiquement sur les 2 subnets.
      ansible.builtin.command: >
        aws ec2 describe-subnets --region {{ aws_region }}
        --subnet-ids {{ public_subnet1.subnet.id }} {{ public_subnet2.subnet.id }}
        --query "Subnets[].Tags[?Key=='kubernetes.io/cluster/{{ eks_cluster_name }}'].Value"
        --output text
      register: cluster_tag_check
      until: "'shared' in cluster_tag_check.stdout"
      retries: 6
      delay: 5
      changed_when: false
      failed_when: false

    - name: Échouer si le tag cluster est absent/mal résolu sur un des subnets
      ansible.builtin.fail:
        msg: >
          Le tag "kubernetes.io/cluster/{{ eks_cluster_name }}" n'est pas
          présent sur les 2 subnets publics (résultat obtenu :
          "{{ cluster_tag_check.stdout }}"). Vérifie qu'aucun ancien tag
          littéral "kubernetes.io/cluster/{{ '{{' }} eks_cluster_name {{ '}}' }}"
          ne traîne encore dessus (aws ec2 describe-subnets --subnet-ids ...
          --query "Subnets[].Tags"), et supprime-le avec aws ec2 delete-tags
          si besoin avant de relancer.
      when: "'shared' not in cluster_tag_check.stdout"

    - name: Créer la table de routage publique
      amazon.aws.ec2_vpc_route_table:
        vpc_id: "{{ vpc.vpc.id }}"
        region: "{{ aws_region }}"
        tags:
          Name: devops-public-rt
        subnets:
          - "{{ public_subnet1.subnet.id }}"
          - "{{ public_subnet2.subnet.id }}"
        routes:
          - dest: 0.0.0.0/0
            gateway_id: "{{ igw.gateway_id }}"
        state: present

    - name: Récapitulatif de l'infrastructure réseau créée
      debug:
        msg:
          - "VPC ID          : {{ vpc.vpc.id }}"
          - "IGW ID          : {{ igw.gateway_id }}"
          - "Subnet public 1 : {{ public_subnet1.subnet.id }} ({{ public_subnet1_cidr }}) — {{ az1 }}"
          - "Subnet public 2 : {{ public_subnet2.subnet.id }} ({{ public_subnet2_cidr }}) — {{ az2 }}"
