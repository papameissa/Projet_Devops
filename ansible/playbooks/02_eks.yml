---
# ==============================================================================
# 02_eks.yml — Créer le cluster EKS DANS le VPC existant (devops-vpc)
# CORRECTION : eksctl créait son propre VPC par défaut (faute de --vpc-*),
# avec 2 NAT Gateway facturés (~32$/mois chacun). Ce playbook récupère le VPC
# et les 2 subnets publics créés par 01_vpc.yml, et les passe explicitement à
# eksctl --vpc-public-subnets : les nodes vivent dans les subnets publics
# (map_public: true), donc aucun NAT Gateway n'est nécessaire.
# ==============================================================================
- name: Créer le cluster EKS dans devops-vpc (sans NAT Gateway)
  hosts: local
  gather_facts: false
  vars_files:
    - ../group_vars/all.yml

  tasks:

    - name: Récupérer l'ID du VPC devops-vpc
      command: >
        aws ec2 describe-vpcs --region {{ aws_region }}
        --filters "Name=tag:Name,Values=devops-vpc"
        --query "Vpcs[0].VpcId" --output text
      register: vpc_id_result
      changed_when: false

    - name: Récupérer l'ID du subnet public 1
      command: >
        aws ec2 describe-subnets --region {{ aws_region }}
        --filters "Name=tag:Name,Values=devops-public-subnet-1"
        --query "Subnets[0].SubnetId" --output text
      register: subnet1_result
      changed_when: false

    - name: Récupérer l'ID du subnet public 2
      command: >
        aws ec2 describe-subnets --region {{ aws_region }}
        --filters "Name=tag:Name,Values=devops-public-subnet-2"
        --query "Subnets[0].SubnetId" --output text
      register: subnet2_result
      changed_when: false

    - name: Vérifier que le VPC et les subnets ont bien été trouvés
      ansible.builtin.fail:
        msg: >
          devops-vpc ou ses subnets publics sont introuvables. Lance d'abord
          'ansible-playbook 01_vpc.yml' avant de créer le cluster EKS.
      when: >
        vpc_id_result.stdout == "None" or vpc_id_result.stdout == "" or
        subnet1_result.stdout == "None" or subnet1_result.stdout == "" or
        subnet2_result.stdout == "None" or subnet2_result.stdout == ""

    - name: Afficher le VPC et les subnets utilisés
      debug:
        msg:
          - "VPC utilisé      : {{ vpc_id_result.stdout }}"
          - "Subnet public 1  : {{ subnet1_result.stdout }}"
          - "Subnet public 2  : {{ subnet2_result.stdout }}"

    - name: Vérifier si le cluster EKS existe déjà
      command: eksctl get cluster --name {{ eks_cluster_name }} --region {{ aws_region }}
      register: cluster_check
      failed_when: false
      changed_when: false

    - name: Créer le cluster EKS DANS devops-vpc (subnets publics, sans NAT Gateway)
      command: >
        eksctl create cluster
        --name {{ eks_cluster_name }}
        --region {{ aws_region }}
        --vpc-public-subnets={{ subnet1_result.stdout }},{{ subnet2_result.stdout }}
        --nodegroup-name {{ eks_nodegroup_name }}
        --node-type {{ eks_node_type }}
        --nodes {{ eks_nodes_desired }}
        --nodes-min {{ eks_nodes_min }}
        --nodes-max {{ eks_nodes_max }}
        --node-private-networking=false
        --managed
      when: cluster_check.rc != 0
      register: eks_creation

    - name: Afficher le résultat de la création (si effectuée)
      debug:
        var: eks_creation.stdout_lines
      when: eks_creation is defined and eks_creation.stdout_lines is defined

    - name: Vérifier qu'aucun NAT Gateway n'a été créé (contrôle de non-régression)
      command: >
        aws ec2 describe-nat-gateways --region {{ aws_region }}
        --filter "Name=vpc-id,Values={{ vpc_id_result.stdout }}" "Name=state,Values=available"
        --query "NatGateways[].NatGatewayId" --output text
      register: nat_check
      changed_when: false

    - name: Avertir si un NAT Gateway a quand même été créé
      debug:
        msg: >
          ATTENTION : un ou plusieurs NAT Gateway existent sur devops-vpc
          ({{ nat_check.stdout }}) — vérifie la config, ils sont facturés.
      when: nat_check.stdout != ""

    - name: Confirmer l'absence de NAT Gateway
      debug:
        msg: "OK : aucun NAT Gateway sur devops-vpc — coût réseau minimal."
      when: nat_check.stdout == ""

    - name: Activer l'enforcement des NetworkPolicy sur l'addon vpc-cni
      # IMPORTANT : par défaut, EKS déclare les NetworkPolicy dans l'API sans
      # les appliquer réellement. Sans cette tâche, k8s/networkpolicy.yaml
      # existerait mais n'aurait aucun effet (faux sentiment de sécurité).
      ansible.builtin.command: >
        aws eks update-addon
        --cluster-name {{ eks_cluster_name }}
        --addon-name vpc-cni
        --resolve-conflicts OVERWRITE
        --configuration-values '{"enableNetworkPolicy":"true"}'
        --region {{ aws_region }}
      changed_when: true
      register: netpol_enable
      failed_when: false

    - name: Avertir si l'activation des NetworkPolicy a échoué
      ansible.builtin.debug:
        msg: >
          Activation de enableNetworkPolicy sur vpc-cni non confirmée
          (version d'addon peut-être trop ancienne). k8s/networkpolicy.yaml
          sera alors sans effet réel — vérifier manuellement si besoin.
      when: netpol_enable.rc != 0

    - name: Vérifier que le nodegroup est bien actif
      command: >
        eksctl get nodegroup
        --cluster {{ eks_cluster_name }}
        --region {{ aws_region }}
      register: nodegroup_check
      changed_when: false

    - name: Afficher les nodegroups détectés
      debug:
        var: nodegroup_check.stdout_lines

    - name: Mettre à jour le kubeconfig local pour ce cluster
      command: >
        aws eks update-kubeconfig
        --name {{ eks_cluster_name }}
        --region {{ aws_region }}
      changed_when: true

    - name: Vérifier les nodes visibles via kubectl
      command: kubectl get nodes -o wide
      register: kubectl_nodes
      changed_when: false

    - name: Afficher les nodes détectés par kubectl
      debug:
        var: kubectl_nodes.stdout_lines

    - name: Avertir si aucun node n'est détecté
      debug:
        msg: >
          ATTENTION : aucun node détecté côté kubectl alors que le nodegroup existe.
          Vérifie les rôles IAM (aws-auth ConfigMap) et le statut du nodegroup
          via 'eksctl get nodegroup --cluster {{ eks_cluster_name }} --region {{ aws_region }}'.
      when: "'No resources found' in kubectl_nodes.stdout or kubectl_nodes.stdout == ''"
