---
# ==============================================================================
# deploy_complet.yml — Orchestrateur : enchaîne TOUT le provisioning et le
# déploiement en une seule commande, jusqu'à l'exposition via l'ALB (Ingress).
#
# Équivalent à lancer, dans l'ordre :
#   01_vpc.yml → 02_eks.yml → 07_alb_controller.yml → 04_ecr_taskapp.yml
#   → 05_build_push_taskapp.yml → 06_deploy_taskapp.yml
#
# Chaque playbook reste idempotent et utilisable séparément (utile pour du
# débogage ciblé) — cet orchestrateur ne fait qu'automatiser leur enchaînement.
#
# Usage :
#   ansible-playbook playbooks/deploy_complet.yml \
#     -e "image_tag=v1" \
#     -e "postgres_user=app_user" \
#     -e "@vault/secrets.yml" --ask-vault-pass
#
# Compter ~20-25 minutes au total (le cluster EKS domine la durée).
# ==============================================================================
- import_playbook: 01_vpc.yml
- import_playbook: 02_eks.yml
- import_playbook: 07_alb_controller.yml
- import_playbook: 04_ecr_taskapp.yml
- import_playbook: 05_build_push_taskapp.yml
- import_playbook: 06_deploy_taskapp.yml
