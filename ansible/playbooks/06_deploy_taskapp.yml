---
# ==============================================================================
# 06_deploy_taskapp.yml — Déploiement de task-app sur le cluster EKS existant
# ==============================================================================

- name: Déployer task-app sur EKS
  hosts: local
  gather_facts: false
  vars_files:
    - ../group_vars/all.yml

  tasks:
    - name: Mettre à jour le kubeconfig
      ansible.builtin.command: >
        aws eks update-kubeconfig
        --name {{ eks_cluster_name }}
        --region {{ aws_region }}
      changed_when: true

    - name: Créer le namespace "{{ k8s_namespace }}" (idempotent)
      ansible.builtin.command: >
        kubectl create namespace {{ k8s_namespace }}
        --dry-run=client -o yaml
      register: ns_manifest
      changed_when: false

    - name: Appliquer le namespace
      ansible.builtin.shell: |
        echo "{{ ns_manifest.stdout }}" | kubectl apply -f -
      changed_when: true

    - name: Vérifier si metrics-server est géré comme add-on EKS
      ansible.builtin.command: >
        aws eks describe-addon
        --cluster-name {{ eks_cluster_name }}
        --addon-name metrics-server
        --region {{ aws_region }}
      register: metrics_addon_check
      changed_when: false
      failed_when: false

    - name: Installer metrics-server via manifeste (uniquement si pas déjà un add-on EKS géré)
      ansible.builtin.shell: |
        kubectl apply -f https://github.com/kubernetes-sigs/metrics-server/releases/latest/download/components.yaml
      changed_when: true
      when: metrics_addon_check.rc != 0

    - name: Confirmer que metrics-server est déjà présent (add-on EKS géré)
      ansible.builtin.debug:
        msg: "metrics-server est un add-on EKS géré : installation via manifeste ignorée."
      when: metrics_addon_check.rc == 0

    - name: Récupérer l'ID du compte AWS
      ansible.builtin.command: aws sts get-caller-identity --query Account --output text
      register: aws_account_id
      changed_when: false

    - name: Construire l'URI complète de l'image
      ansible.builtin.set_fact:
        ecr_uri: "903449438459.dkr.ecr.us-east-1.amazonaws.com/task-app:latest"

    - name: Générer le Secret K8s à partir des variables (jamais commité en clair)
      ansible.builtin.copy:
        dest: /tmp/task-secret.yaml
        mode: "0600"
        content: |
          apiVersion: v1
          kind: Secret
          metadata:
            name: task-secrets
            namespace: {{ k8s_namespace }}
          type: Opaque
          stringData:
            POSTGRES_USER: "{{ postgres_user }}"
            POSTGRES_PASSWORD: "{{ postgres_password }}"
      no_log: true

    - name: Générer le manifest application avec image ECR
      ansible.builtin.copy:
        dest: /tmp/task-deployment.yaml
        mode: "0644"
        content: |
          apiVersion: apps/v1
          kind: Deployment
          metadata:
            name: task-app
            namespace: {{ k8s_namespace }}
            labels:
              app: task-app
          spec:
            replicas: 2
            progressDeadlineSeconds: 600
            minReadySeconds: 5
            revisionHistoryLimit: 3
            strategy:
              type: RollingUpdate
              rollingUpdate:
                maxUnavailable: 0
                maxSurge: 1
            selector:
              matchLabels:
                app: task-app
            template:
              metadata:
                labels:
                  app: task-app
              spec:
                containers:
                  - name: task-app
                    image: {{ ecr_uri }}
                    imagePullPolicy: Always
                    ports:
                      - containerPort: 5000
                    env:
                      - name: POSTGRES_HOST
                        value: task-db
                      - name: POSTGRES_PORT
                        value: "5432"
                      - name: POSTGRES_DB
                        valueFrom:
                          configMapKeyRef:
                            name: task-config
                            key: POSTGRES_DB
                      - name: POSTGRES_USER
                        valueFrom:
                          secretKeyRef:
                            name: task-secrets
                            key: POSTGRES_USER
                      - name: POSTGRES_PASSWORD
                        valueFrom:
                          secretKeyRef:
                            name: task-secrets
                            key: POSTGRES_PASSWORD
                    readinessProbe:
                      httpGet:
                        path: /health
                        port: 5000
                      initialDelaySeconds: 15
                      periodSeconds: 10
                      timeoutSeconds: 5
                      failureThreshold: 6
                    livenessProbe:
                      httpGet:
                        path: /health
                        port: 5000
                      initialDelaySeconds: 45
                      periodSeconds: 20
                      timeoutSeconds: 5
                      failureThreshold: 3
                    startupProbe:
                      httpGet:
                        path: /health
                        port: 5000
                      failureThreshold: 30
                      periodSeconds: 10
                    resources:
                      requests:
                        cpu: "100m"
                        memory: "128Mi"
                      limits:
                        cpu: "500m"
                        memory: "512Mi"

    - name: Appliquer les manifests K8s dans le bon ordre
      ansible.builtin.command: "kubectl apply -n {{ k8s_namespace }} -f {{ item }}"
      loop:
        - "{{ playbook_dir }}/../../k8s/configmap.yaml"
        - "/tmp/task-secret.yaml"
        - "{{ playbook_dir }}/../../k8s/postgres-service.yaml"
        - "{{ playbook_dir }}/../../k8s/postgres-deployment.yaml"
        - "/tmp/task-deployment.yaml"
        - "{{ playbook_dir }}/../../k8s/service.yaml"
        - "{{ playbook_dir }}/../../k8s/hpa.yaml"
        - "{{ playbook_dir }}/../../k8s/networkpolicy.yaml"
      changed_when: true

    - name: Attendre que le déploiement soit prêt (timeout 300s)
      ansible.builtin.command: >
        kubectl rollout status deployment/task-app
        -n {{ k8s_namespace }} --timeout=300s
      register: rollout_result
      changed_when: false
      failed_when: rollout_result.rc != 0

    - name: Diagnostiquer le déploiement si le rollout échoue
      ansible.builtin.shell: |
        echo "=== deployment/task-app ==="
        kubectl describe deployment task-app -n {{ k8s_namespace }} || true
        echo "=== pods ==="
        kubectl get pods -n {{ k8s_namespace }} -o wide || true
        echo "=== events ==="
        kubectl get events -n {{ k8s_namespace }} --sort-by=.metadata.creationTimestamp | tail -50 || true
      when: rollout_result.rc != 0
      changed_when: false

    - name: Nettoyer les fichiers temporaires contenant des secrets
      ansible.builtin.file:
        path: "{{ item }}"
        state: absent
      loop:
        - /tmp/task-secret.yaml
        - /tmp/task-deployment.yaml

    - name: Récupérer l'URL du LoadBalancer
      ansible.builtin.command: >
        kubectl get service task-service -n {{ k8s_namespace }}
        -o jsonpath="{.status.loadBalancer.ingress[0].hostname}"
      register: lb_hostname
      changed_when: false

    - name: Afficher l'URL d'accès à l'application
      ansible.builtin.debug:
        msg: "App accessible sur : http://{{ lb_hostname.stdout | default('en attente du LoadBalancer, réessaie dans 2 min') }}"
