---
# ==============================================================================
# 06_deploy_taskapp.yml — Déploiement de task-app sur le cluster EKS existant
# hosts: local (groupe d'inventaire) — pattern harmonisé avec 01, 02, 04, 05.
# Namespace dédié, secret généré à la volée, metrics-server, tag d'image unique.
# ==============================================================================
- name: Déployer task-app sur EKS
  hosts: local
  gather_facts: false
  vars_files:
    - ../group_vars/all.yml

  tasks:
    - name: Mettre à jour le kubeconfig
      ansible.builtin.command: >
        aws eks update-kubeconfig
        --name {{ eks_cluster_name }}
        --region {{ aws_region }}
      changed_when: true

    - name: Créer le namespace "{{ k8s_namespace }}" (idempotent)
      ansible.builtin.command: >
        kubectl create namespace {{ k8s_namespace }}
        --dry-run=client -o yaml
      register: ns_manifest
      changed_when: false

    - name: Appliquer le namespace
      ansible.builtin.shell: |
        echo "{{ ns_manifest.stdout }}" | kubectl apply -f -
      changed_when: true

    - name: Vérifier si metrics-server est déjà déployé
      ansible.builtin.command: kubectl get deployment metrics-server -n kube-system
      register: metrics_check
      failed_when: false
      changed_when: false

    - name: Supprimer l'ancien metrics-server si présent (pour éviter le conflit de selector immuable)
      ansible.builtin.command: >
        kubectl delete -f
        https://github.com/kubernetes-sigs/metrics-server/releases/latest/download/components.yaml
        --ignore-not-found
      when: metrics_check.rc == 0
      changed_when: true

    - name: Installer metrics-server (requis pour le HPA), idempotent
      ansible.builtin.command: >
        kubectl apply -f
        https://github.com/kubernetes-sigs/metrics-server/releases/latest/download/components.yaml
      changed_when: true

    - name: Patch metrics-server pour EKS (kubelet-insecure-tls)
      ansible.builtin.command: >
        kubectl patch deployment metrics-server -n kube-system --type=json
        -p='[{"op":"add","path":"/spec/template/spec/containers/0/args/-","value":"--kubelet-insecure-tls"}]'
      register: patch_result
      failed_when: patch_result.rc != 0 and 'already exists' not in patch_result.stderr
      changed_when: patch_result.rc == 0

    - name: Récupérer l'ID du compte AWS
      ansible.builtin.command: aws sts get-caller-identity --query Account --output text
      register: aws_account_id
      changed_when: false

    # ---------- Driver EBS CSI (requis pour provisionner la PVC de postgres) ----------
    # SANS CECI : la StatefulSet task-db reste bloquée en Pending pour toujours
    # ("no persistent volumes available for this claim and no storage class is set").
    # Depuis EKS 1.23+, le provisioner in-tree gp2 n'existe plus par défaut ; il faut
    # explicitement le driver EBS CSI (addon) + une StorageClass qui le référence.
    - name: Créer le ServiceAccount IRSA "ebs-csi-controller-sa" (kube-system)
      ansible.builtin.command: >
        eksctl create iamserviceaccount
        --cluster {{ eks_cluster_name }}
        --region {{ aws_region }}
        --namespace kube-system
        --name ebs-csi-controller-sa
        --role-name eksctl-{{ eks_cluster_name }}-ebs-csi-role
        --attach-policy-arn arn:aws:iam::aws:policy/service-role/AmazonEBSCSIDriverPolicy
        --approve
        --override-existing-serviceaccounts
      changed_when: true

    - name: Installer/mettre à jour l'addon EKS aws-ebs-csi-driver
      # replicaCount=1 : par défaut l'addon lance 2 réplicas du controller
      # (6 conteneurs chacun, ~230Mi de requests/pod). Sur des nœuds t3.micro
      # déjà chargés (task-app, postgres, metrics-server, ALB controller,
      # cert-manager...), 2 réplicas font déborder la mémoire disponible
      # ("Insufficient memory", pods du controller Pending indéfiniment).
      # Un seul réplica suffit largement pour ce projet (pas de besoin de HA).
      ansible.builtin.command: >
        aws eks update-addon
        --cluster-name {{ eks_cluster_name }}
        --addon-name aws-ebs-csi-driver
        --service-account-role-arn arn:aws:iam::{{ aws_account_id.stdout }}:role/eksctl-{{ eks_cluster_name }}-ebs-csi-role
        --configuration-values '{"controller":{"replicaCount":1}}'
        --resolve-conflicts OVERWRITE
        --region {{ aws_region }}
      register: ebs_addon_update
      failed_when: false
      changed_when: ebs_addon_update.rc == 0

    - name: "Fallback : créer l'addon aws-ebs-csi-driver si l'update a échoué (première installation)"
      ansible.builtin.command: >
        aws eks create-addon
        --cluster-name {{ eks_cluster_name }}
        --addon-name aws-ebs-csi-driver
        --service-account-role-arn arn:aws:iam::{{ aws_account_id.stdout }}:role/eksctl-{{ eks_cluster_name }}-ebs-csi-role
        --configuration-values '{"controller":{"replicaCount":1}}'
        --resolve-conflicts OVERWRITE
        --region {{ aws_region }}
      when: ebs_addon_update.rc != 0
      changed_when: true

    - name: Attendre que l'addon aws-ebs-csi-driver soit ACTIVE
      ansible.builtin.command: >
        aws eks describe-addon
        --cluster-name {{ eks_cluster_name }}
        --addon-name aws-ebs-csi-driver
        --region {{ aws_region }}
        --query addon.status --output text
      register: ebs_addon_status
      until: ebs_addon_status.stdout == "ACTIVE"
      retries: 18
      delay: 10
      changed_when: false

    - name: Appliquer la StorageClass gp3 par défaut
      ansible.builtin.command: >
        kubectl apply -f {{ playbook_dir }}/../../k8s/storageclass.yaml
      changed_when: true

    - name: Construire l'URI complète de l'image
      ansible.builtin.set_fact:
        ecr_uri: "{{ aws_account_id.stdout }}.dkr.ecr.{{ aws_region }}.amazonaws.com/{{ ecr_repository_name }}:{{ image_tag }}"

    - name: Générer le Secret K8s à partir des variables (jamais commité en clair)
      ansible.builtin.copy:
        dest: /tmp/task-secret.yaml
        mode: "0600"
        content: |
          apiVersion: v1
          kind: Secret
          metadata:
            name: task-secrets
            namespace: {{ k8s_namespace }}
          type: Opaque
          stringData:
            POSTGRES_USER: "{{ postgres_user }}"
            POSTGRES_PASSWORD: "{{ postgres_password }}"
      no_log: true

    - name: Remplacer le placeholder d'image dans deployment.yaml
      ansible.builtin.shell: >
        sed 's|REMPLACER_PAR_TON_ECR_URI:latest|{{ ecr_uri }}|g'
        {{ playbook_dir }}/../../k8s/deployment.yaml > /tmp/task-deployment.yaml
      changed_when: true

    - name: Appliquer les manifests K8s dans le bon ordre
      ansible.builtin.command: "kubectl apply -n {{ k8s_namespace }} -f {{ item }}"
      loop:
        - "{{ playbook_dir }}/../../k8s/configmap.yaml"
        - "/tmp/task-secret.yaml"
        - "{{ playbook_dir }}/../../k8s/postgres-service.yaml"
        - "{{ playbook_dir }}/../../k8s/postgres-deployment.yaml"
        - "/tmp/task-deployment.yaml"
        - "{{ playbook_dir }}/../../k8s/service.yaml"
        - "{{ playbook_dir }}/../../k8s/hpa.yaml"
        - "{{ playbook_dir }}/../../k8s/networkpolicy.yaml"
        - "{{ playbook_dir }}/../../k8s/ingress.yaml"
      changed_when: true

    - name: Attendre que le déploiement soit prêt (timeout 180s), avec diagnostic auto en cas d'échec
      block:
        - name: Attendre que le déploiement soit prêt (timeout 180s)
          ansible.builtin.command: >
            kubectl rollout status deployment/task-app
            -n {{ k8s_namespace }} --timeout=180s
          changed_when: false
      rescue:
        - name: "[DIAG] État des pods du namespace"
          ansible.builtin.command: "kubectl get pods -n {{ k8s_namespace }} -o wide"
          register: diag_pods
          changed_when: false

        - name: "[DIAG] Describe des pods non-Ready"
          ansible.builtin.shell: >
            kubectl get pods -n {{ k8s_namespace }} -o jsonpath='{.items[*].metadata.name}'
            | tr ' ' '\n' | xargs -I{} sh -c
            'echo ---{}---; kubectl describe pod {} -n {{ k8s_namespace }}'
          register: diag_describe
          changed_when: false

        - name: "[DIAG] Derniers logs des pods task-app"
          ansible.builtin.shell: >
            kubectl logs -n {{ k8s_namespace }} -l app=task-app
            --tail=50 --all-containers --prefix
          register: diag_logs
          changed_when: false
          failed_when: false

        - name: "[DIAG] Événements récents du namespace"
          ansible.builtin.command: >
            kubectl get events -n {{ k8s_namespace }}
            --sort-by=.lastTimestamp
          register: diag_events
          changed_when: false

        - name: Afficher le diagnostic complet
          ansible.builtin.debug:
            msg:
              - "=== PODS ==="
              - "{{ diag_pods.stdout_lines }}"
              - "=== DESCRIBE ==="
              - "{{ diag_describe.stdout_lines }}"
              - "=== LOGS ==="
              - "{{ diag_logs.stdout_lines | default(['(aucun log disponible)']) }}"
              - "=== EVENTS ==="
              - "{{ diag_events.stdout_lines }}"

        - name: Échouer explicitement après diagnostic
          ansible.builtin.fail:
            msg: "Le rollout de task-app a timeout. Voir le diagnostic ci-dessus pour la cause réelle (pods, describe, logs, events)."

    - name: Nettoyer les fichiers temporaires contenant des secrets
      ansible.builtin.file:
        path: "{{ item }}"
        state: absent
      loop:
        - /tmp/task-secret.yaml
        - /tmp/task-deployment.yaml

    - name: Attendre que l'ALB Controller provisionne l'adresse de l'Ingress (jusqu'à 3 min)
      # Le provisioning d'un ALB par le controller n'est pas instantané (souvent
      # 60-120s). On boucle plutôt que d'échouer sur un champ encore vide.
      ansible.builtin.command: >
        kubectl get ingress task-ingress -n {{ k8s_namespace }}
        -o jsonpath="{.status.loadBalancer.ingress[0].hostname}"
      register: alb_hostname
      until: alb_hostname.stdout != ""
      retries: 18
      delay: 10
      changed_when: false
      failed_when: false

    - name: Afficher l'URL d'accès à l'application (via ALB/Ingress)
      ansible.builtin.debug:
        msg: "App accessible sur : http://{{ alb_hostname.stdout | default('ALB pas encore provisionné, vérifie : kubectl get ingress task-ingress -n ' + k8s_namespace) }}"
