---
# ==============================================================================
# 06_deploy_taskapp.yml — Déploiement de task-app sur le cluster EKS existant
# hosts: local (groupe d'inventaire) — pattern harmonisé avec 01, 02, 04, 05.
# Namespace dédié, secret généré à la volée, metrics-server, tag d'image unique.
# ==============================================================================
- name: Déployer task-app sur EKS
  hosts: local
  gather_facts: false
  vars_files:
    - ../group_vars/all.yml

  tasks:
    - name: Mettre à jour le kubeconfig
      ansible.builtin.command: >
        aws eks update-kubeconfig
        --name {{ eks_cluster_name }}
        --region {{ aws_region }}
      changed_when: true

    - name: Créer le namespace "{{ k8s_namespace }}" (idempotent)
      ansible.builtin.command: >
        kubectl create namespace {{ k8s_namespace }}
        --dry-run=client -o yaml
      register: ns_manifest
      changed_when: false

    - name: Appliquer le namespace
      ansible.builtin.shell: |
        echo "{{ ns_manifest.stdout }}" | kubectl apply -f -
      changed_when: true

    - name: Vérifier si metrics-server est géré comme add-on EKS
      ansible.builtin.command: >
        aws eks describe-addon --cluster-name {{ eks_cluster_name }}
        --addon-name metrics-server --region {{ aws_region }}
      register: metrics_addon_check
      changed_when: false
      failed_when: false

    # metrics-server est géré par AWS via "aws eks create-addon" sur ce cluster
    # (visible dans "aws eks list-addons"). Appliquer le manifeste upstream par-dessus
    # provoque un conflit (selector immutable + doublon de port "https"), car ce
    # Deployment n'a jamais été créé via "kubectl apply". On ne l'installe donc QUE
    # s'il n'est pas déjà géré comme add-on.
    - name: Installer metrics-server via manifeste (uniquement si pas déjà un add-on EKS géré)
      ansible.builtin.command: >
        kubectl apply -f
        https://github.com/kubernetes-sigs/metrics-server/releases/latest/download/components.yaml
      changed_when: true
      when: metrics_addon_check.rc != 0

    - name: Confirmer que metrics-server est déjà présent (add-on EKS géré)
      ansible.builtin.debug:
        msg: "metrics-server est un add-on EKS géré (aws eks list-addons) : installation via manifeste ignorée pour éviter tout conflit de selector/ports."
      when: metrics_addon_check.rc == 0

    - name: Récupérer l'ID du compte AWS
      ansible.builtin.command: aws sts get-caller-identity --query Account --output text
      register: aws_account_id
      changed_when: false

    - name: Construire l'URI complète de l'image
      ansible.builtin.set_fact:
        ecr_uri: "{{ aws_account_id.stdout }}.dkr.ecr.{{ aws_region }}.amazonaws.com/{{ ecr_repository_name }}:{{ image_tag }}"

    - name: Générer le Secret K8s à partir des variables (jamais commité en clair)
      ansible.builtin.copy:
        dest: /tmp/task-secret.yaml
        mode: "0600"
        content: |
          apiVersion: v1
          kind: Secret
          metadata:
            name: task-secrets
            namespace: {{ k8s_namespace }}
          type: Opaque
          stringData:
            POSTGRES_USER: "{{ postgres_user }}"
            POSTGRES_PASSWORD: "{{ postgres_password }}"
      no_log: true

    - name: Remplacer le placeholder d'image dans deployment.yaml
      ansible.builtin.shell: >
        sed 's|REMPLACER_PAR_TON_ECR_URI:latest|{{ ecr_uri }}|g'
        {{ playbook_dir }}/../../k8s/deployment.yaml > /tmp/task-deployment.yaml
      changed_when: true

    - name: Appliquer les manifests K8s dans le bon ordre
      ansible.builtin.command: "kubectl apply -n {{ k8s_namespace }} -f {{ item }}"
      loop:
        - "{{ playbook_dir }}/../../k8s/configmap.yaml"
        - "/tmp/task-secret.yaml"
        - "{{ playbook_dir }}/../../k8s/postgres-service.yaml"
        - "{{ playbook_dir }}/../../k8s/postgres-deployment.yaml"
        - "/tmp/task-deployment.yaml"
        - "{{ playbook_dir }}/../../k8s/service.yaml"
        - "{{ playbook_dir }}/../../k8s/hpa.yaml"
        - "{{ playbook_dir }}/../../k8s/networkpolicy.yaml"
      changed_when: true

    - name: Attendre que le déploiement soit prêt (timeout 180s)
      ansible.builtin.command: >
        kubectl rollout status deployment/task-app
        -n {{ k8s_namespace }} --timeout=180s
      changed_when: false

    - name: Nettoyer les fichiers temporaires contenant des secrets
      ansible.builtin.file:
        path: "{{ item }}"
        state: absent
      loop:
        - /tmp/task-secret.yaml
        - /tmp/task-deployment.yaml

    - name: Récupérer l'URL du LoadBalancer
      ansible.builtin.command: >
        kubectl get service task-service -n {{ k8s_namespace }}
        -o jsonpath="{.status.loadBalancer.ingress[0].hostname}"
      register: lb_hostname
      changed_when: false

    - name: Afficher l'URL d'accès à l'application
      ansible.builtin.debug:
        msg: "App accessible sur : http://{{ lb_hostname.stdout | default('en attente du LoadBalancer, réessaie dans 2 min') }}"
