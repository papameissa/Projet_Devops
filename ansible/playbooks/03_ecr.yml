---
# ==============================================================================
# ⚠️ LEGACY — NON UTILISÉ POUR task-app
# Ce playbook créait un repo ECR "flask-app" (skeleton générique du guide PDF).
# Le projet réel utilise "task-app" via 04_ecr_taskapp.yml — ne pas exécuter
# celui-ci sauf si tu veux explicitement recréer l'ancien repo flask-app.
# ==============================================================================
- name: Créer le repository ECR
  hosts: localhost
  connection: local
  tasks:
    - name: Créer ECR via AWS CLI
      command: >
        aws ecr create-repository
        --repository-name flask-app
        --region us-east-1
      register: ecr_result
      ignore_errors: true

    - name: Récupérer l'URI ECR
      command: >
        aws ecr describe-repositories
        --repository-names flask-app
        --region us-east-1
        --query 'repositories[0].repositoryUri'
        --output text
      register: ecr_uri

    - name: Afficher l'URI ECR
      debug:
        msg: "ECR URI : {{ ecr_uri.stdout }}"
