---
# ==============================================================================
# 05_build_push_taskapp.yml — Build de l'image Docker task-app et push vers ECR
# CORRECTION : hosts: local → hosts: localhost
# ==============================================================================
- name: Builder et pousser l'image task-app vers ECR
  hosts: localhost
  connection: local
  gather_facts: false
  vars_files:
    - ../group_vars/all.yml

  tasks:
    - name: Récupérer l'ID du compte AWS
      ansible.builtin.command: aws sts get-caller-identity --query Account --output text
      register: aws_account_id
      changed_when: false

    - name: Construire l'URI complète du repository ECR
      ansible.builtin.set_fact:
        ecr_uri: "{{ aws_account_id.stdout }}.dkr.ecr.{{ aws_region }}.amazonaws.com/{{ ecr_repository_name }}"

    - name: Authentifier Docker auprès d'ECR
      ansible.builtin.shell: >
        aws ecr get-login-password --region {{ aws_region }}
        | docker login --username AWS --password-stdin {{ aws_account_id.stdout }}.dkr.ecr.{{ aws_region }}.amazonaws.com
      changed_when: true

    - name: Builder l'image Docker
      ansible.builtin.command:
        cmd: docker build -t {{ ecr_repository_name }}:{{ image_tag }} .
        chdir: "{{ playbook_dir }}/../../app"
      changed_when: true

    - name: Tagger l'image pour ECR
      ansible.builtin.command:
        cmd: docker tag {{ ecr_repository_name }}:{{ image_tag }} {{ ecr_uri }}:{{ image_tag }}
      changed_when: true

    - name: Tagger aussi en latest
      ansible.builtin.command:
        cmd: docker tag {{ ecr_repository_name }}:{{ image_tag }} {{ ecr_uri }}:latest
      changed_when: true

    - name: Pousser l'image vers ECR (tag sha)
      ansible.builtin.command:
        cmd: docker push {{ ecr_uri }}:{{ image_tag }}
      changed_when: true

    - name: Pousser l'image vers ECR (tag latest)
      ansible.builtin.command:
        cmd: docker push {{ ecr_uri }}:latest
      changed_when: true

    - name: Afficher l'URI finale de l'image
      ansible.builtin.debug:
        msg: "Image poussée : {{ ecr_uri }}:{{ image_tag }}"
