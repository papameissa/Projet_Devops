---
# ==============================================================================
# 05_build_push_taskapp.yml — Build de l'image Docker task-app et push vers ECR
# CORRECTION : suppression du tag/push "latest" — incompatible avec
# ecr_image_tag_mutability: IMMUTABLE (le 2e push échouerait, tag déjà existant).
# Seul le tag unique (image_tag, ex. le SHA du commit) est poussé.
# ==============================================================================
- name: Builder et pousser l'image task-app vers ECR
  hosts: local
  gather_facts: false
  vars_files:
    - ../group_vars/all.yml

  tasks:
    - name: Récupérer l'ID du compte AWS
      ansible.builtin.command: aws sts get-caller-identity --query Account --output text
      register: aws_account_id
      changed_when: false

    - name: Construire l'URI complète du repository ECR
      ansible.builtin.set_fact:
        ecr_uri: "{{ aws_account_id.stdout }}.dkr.ecr.{{ aws_region }}.amazonaws.com/{{ ecr_repository_name }}"

    - name: Authentifier Docker auprès d'ECR
      ansible.builtin.shell: >
        aws ecr get-login-password --region {{ aws_region }}
        | docker login --username AWS --password-stdin {{ aws_account_id.stdout }}.dkr.ecr.{{ aws_region }}.amazonaws.com
      changed_when: true

    - name: Builder l'image Docker
      ansible.builtin.command:
        cmd: docker build -t {{ ecr_repository_name }}:{{ image_tag }} .
        chdir: "{{ playbook_dir }}/../../app"
      changed_when: true

    - name: Tagger l'image pour ECR
      ansible.builtin.command:
        cmd: docker tag {{ ecr_repository_name }}:{{ image_tag }} {{ ecr_uri }}:{{ image_tag }}
      changed_when: true

    - name: Vérifier si le tag existe déjà dans ECR (tags immutables : push inutile/impossible si déjà présent)
      ansible.builtin.command: >
        aws ecr describe-images
        --repository-name {{ ecr_repository_name }}
        --image-ids imageTag={{ image_tag }}
        --region {{ aws_region }}
      register: ecr_tag_check
      changed_when: false
      failed_when: false

    - name: Pousser l'image vers ECR (uniquement si ce tag n'existe pas déjà)
      ansible.builtin.command:
        cmd: docker push {{ ecr_uri }}:{{ image_tag }}
      changed_when: true
      when: ecr_tag_check.rc != 0

    - name: Informer que le tag existe déjà (rien à pousser)
      ansible.builtin.debug:
        msg: "Le tag {{ image_tag }} existe déjà dans ECR (immutable) — push ignoré, image déjà disponible pour le déploiement."
      when: ecr_tag_check.rc == 0

    - name: Afficher l'URI finale de l'image
      ansible.builtin.debug:
        msg: "Image poussée : {{ ecr_uri }}:{{ image_tag }}"
