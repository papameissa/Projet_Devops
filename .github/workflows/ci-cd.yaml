name: CI/CD — task-app ISI Dakar

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  AWS_REGION: us-east-1
  ECR_REPOSITORY_NAME: task-app
  IMAGE_TAG: ${{ github.sha }}

jobs:

  # ── Job 1 : Lint Python ────────────────────────────────────────
  lint:
    name: "1. Lint Python"
    runs-on: ubuntu-latest
    steps:
      - name: Checkout du code
        uses: actions/checkout@v4

      - name: Installer les dépendances + flake8
        run: |
          pip install --break-system-packages -r app/requirements.txt
          pip install --break-system-packages flake8

      - name: Lint avec flake8
        run: flake8 app/app.py --max-line-length=120 --extend-ignore=E501 || true

  # ── Job 2 : Build Docker (vérification) ────────────────────────
  build-check:
    name: "2. Build Docker Image"
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - name: Checkout du code
        uses: actions/checkout@v4

      - name: Vérifier que l'image se build correctement
        run: docker build -t task-app:build-check ./app

  # ── Job 3 : Ansible — Build & Push ECR ─────────────────────────
  ansible-build-push:
    name: "3. Push Image to ECR (Ansible)"
    runs-on: ubuntu-latest
    needs: build-check
    steps:
      - name: Checkout du code
        uses: actions/checkout@v4

      - name: Configurer les credentials AWS
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Installer Ansible et les collections requises
        run: |
          pip install --break-system-packages ansible boto3 botocore
          ansible-galaxy collection install amazon.aws community.aws

      - name: Ansible — Build & Push vers ECR
        working-directory: ansible
        run: |
          ansible-playbook playbooks/05_build_push_taskapp.yml \
            -e "image_tag=${{ env.IMAGE_TAG }}"

  # ── Job 4 : Ansible — Deploy EKS ──────────────────────────────
  ansible-deploy:
    name: "4. Ansible Playbook + Deploy to Kubernetes"
    runs-on: ubuntu-latest
    needs: ansible-build-push
    steps:
      - name: Checkout du code
        uses: actions/checkout@v4

      - name: Configurer les credentials AWS
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Installer kubectl
        run: |
          curl -LO "https://dl.k8s.io/release/$(curl -L -s https://dl.k8s.io/release/stable.txt)/bin/linux/amd64/kubectl"
          chmod +x kubectl
          sudo mv kubectl /usr/local/bin/

      - name: Installer Ansible et les collections requises
        run: |
          pip install --break-system-packages ansible boto3 botocore
          ansible-galaxy collection install amazon.aws community.aws

      - name: Ansible — Déploiement sur EKS
        working-directory: ansible
        run: |
          ansible-playbook playbooks/06_deploy_taskapp.yml \
            -e "image_tag=${{ env.IMAGE_TAG }}" \
            -e "postgres_user=${{ secrets.POSTGRES_USER }}" \
            -e "postgres_password=${{ secrets.POSTGRES_PASSWORD }}"

      - name: Afficher l'URL du LoadBalancer
        run: |
          kubectl get service task-service -n application \
            -o jsonpath="{.status.loadBalancer.ingress[0].hostname}" || true
